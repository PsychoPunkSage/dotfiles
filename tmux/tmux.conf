# Prefix key: Ctrl+Space (mirrors nvim leader ergonomics, frees C-b entirely)
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Tmux config Reload:
unbind r
bind r source-file ~/.config/tmux/tmux.conf

# Mouse enablement
set -g mouse on

# Pass through Kitty keyboard protocol (needed for apps like Claude Code to
# distinguish Shift+Enter from plain Enter instead of both submitting)
set -s extended-keys always
set -as terminal-features 'xterm*:extkeys'

# Copying selected characters -> clipboard
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"

# Navigation key bindings: pane nav handled by vim-tmux-navigator plugin below
bind -n M-l next-window
bind -n M-h previous-window

# Minimal status bar, hand-rolled with tokyonight 'night' palette (no plugin)
# 3 status lines: blank gap, content, blank gap (tmux only auto-fills line 0
# with the built-in content format, so it's moved to line 1 explicitly here)
set -g status 3
set -g status-format[0] ''
set -g status-format[1] '#[align=left range=left #{E:status-left-style}]#[push-default]#{T;=/#{status-left-length}:status-left}#[pop-default]#[norange default]#[list=on align=#{status-justify}]#[list=left-marker]<#[list=right-marker]>#[list=on]#{W:#[range=window|#{window_index} #{E:window-status-style}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-format}#[pop-default]#[norange default]#{?window_end_flag,,#{window-status-separator}},#[range=window|#{window_index} list=focus #{?#{!=:#{E:window-status-current-style},default},#{E:window-status-current-style},#{E:window-status-style}}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-current-format}#[pop-default]#[norange list=on default]#{?window_end_flag,,#{window-status-separator}}}#[nolist align=right range=right #{E:status-right-style}]#[push-default]#{T;=/#{status-right-length}:status-right}#[pop-default]#[norange default]'
set -g status-format[2] ''
set -g status-style 'bg=default,fg=#a9b1d6'
set -g status-left-length 20
set -g status-right-length 40
set -g status-left '#[fg=#1a1b26,bg=brightgreen,bold] #S #[fg=brightgreen,bg=default,nobold]'
set -g status-right '#[fg=#565f89,bg=default]#[fg=#1a1b26,bg=#565f89] %Y-%m-%d  %H:%M '
set -g window-status-format ' #I:#W '
set -g window-status-current-format '#[fg=#1a1b26,bg=#7aa2f7,bold] #I:#W #[fg=#7aa2f7,bg=default,nobold]'
set -g window-status-separator ''
set -g status-justify left

# Windows numbering system
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Open panes/windows in current dir
bind h split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# List of plugins
set -g @plugin 'tmux-plugins/tpm' # Package manager
set -g @plugin 'christoomey/vim-tmux-navigator' # Smart Navigation
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect' # Save/restore sessions manually
set -g @plugin 'tmux-plugins/tmux-continuum' # Auto-save + auto-restore on start

# tmux-continuum: autosave every 15 min and restore last session when tmux starts
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# init TPM
run '~/.config/tmux/plugins/tpm/tpm'
